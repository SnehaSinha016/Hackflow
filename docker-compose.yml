version: "3.9"

services:
  backend:
    build:
      context: ./server
    container_name: hackflow_backend

    ports:
      - "5000:5000"

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - ./server/.env

    depends_on:
      - mongodb

    restart: always

  frontend:
    build:
      context: ./Client
    container_name: hackflow_frontend

    ports:
      - "5173:5173"

    volumes:
      - ./Client:/app
      - /app/node_modules

    depends_on:
      - backend

    stdin_open: true
    tty: true

  mongodb:
    image: mongo:7
    container_name: hackflow_db

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: